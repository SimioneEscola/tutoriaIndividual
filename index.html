<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE 1 — Ficha de Evolução da Tutoria Individual</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCjXJuwZrF15T7ox8PRNTdsFMVq1BiKQ3w",
    authDomain: "fe1-tutoria.firebaseapp.com",
    databaseURL: "https://fe1-tutoria-default-rtdb.firebaseio.com",
    projectId: "fe1-tutoria",
    storageBucket: "fe1-tutoria.firebasestorage.app",
    messagingSenderId: "897754828958",
    appId: "1:897754828958:web:6fd989839d94bb2d6aab8f",
    measurementId: "G-KVHHFKF589"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window._fbSet = (path, data) => set(ref(db, path), data);
  window._fbGet = (path) => get(ref(db, path));
  window._fbReady = true;

  // Resolver qualquer chamada que estava aguardando
  if (window._fbQueue) {
    window._fbQueue.forEach(fn => fn());
    window._fbQueue = [];
  }
  window.dispatchEvent(new Event("fbready"));
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --az:#1565C0;--azm:#1976D2;--azc:#E3F2FD;--azb:#90CAF9;
  --azd:#0D47A1;--gz:#f7f7f7;--bd:#e0e0e0;--tx:#212121;--mt:#757575;
  --adm:#4A148C;--adm2:#7B1FA2;--admc:#F3E5F5;--admb:#CE93D8;
}
body{font-family:system-ui,-apple-system,sans-serif;background:#eceff1;color:var(--tx);min-height:100vh;padding-bottom:48px;}

/* ── LOGIN ── */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D47A1,#1976D2);padding:24px;}
.login-card{background:#fff;border-radius:18px;padding:48px 44px 40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-size:21px;font-weight:800;color:var(--azd);letter-spacing:-.5px;line-height:1.2;}
.login-logo p{font-size:12px;color:var(--mt);margin-top:4px;}
.login-badge{display:inline-block;background:var(--azc);color:var(--azm);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px;}
.login-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.login-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--azm);}
.login-field select,.login-field input{font-size:14px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:10px;background:var(--gz);color:var(--tx);width:100%;transition:border-color .15s;}
.login-field select:focus,.login-field input:focus{outline:none;border-color:var(--azm);background:#fff;box-shadow:0 0 0 3px rgba(25,118,210,.1);}
.login-btn{width:100%;padding:13px;background:var(--azm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px;}
.login-btn:hover{background:var(--azd);}
.login-btn:disabled{background:#90CAF9;cursor:not-allowed;}
.login-erro{margin-top:14px;background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;border-radius:8px;padding:10px 14px;font-size:13px;text-align:center;display:none;}

/* ── LOADING ── */
#loading-overlay{position:fixed;inset:0;background:rgba(13,71,161,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:14px;font-weight:500;}

/* ── APP ── */
#app{display:none;}

/* ── TOP BAR ── */
.top-bar{background:var(--azd);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.top-bar.adm-bar{background:var(--adm);}
.top-bar-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);}
.top-bar-user{display:flex;align-items:center;gap:10px;}
.top-bar-nome{font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.adm-badge-top{font-size:10px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:20px;}
.cloud-status{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.7);}
.cloud-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;transition:background .3s;}
.cloud-dot.saving{background:#FF9800;animation:pulse .6s infinite;}
.cloud-dot.error{background:#f44336;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-logout{font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;cursor:pointer;transition:all .15s;}
.btn-logout:hover{background:rgba(255,255,255,.15);}

/* ── TABS ADMIN ── */
.adm-tabs{background:var(--adm);padding:0 20px;display:flex;gap:4px;border-top:1px solid rgba(255,255,255,.1);}
.adm-tab{font-size:12px;font-weight:600;padding:10px 20px 8px;border:none;border-radius:6px 6px 0 0;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border-bottom:3px solid transparent;}
.adm-tab:hover{background:rgba(255,255,255,.2);color:#fff;}
.adm-tab.at{background:#fff;color:var(--adm);font-weight:700;border-bottom-color:#fff;}

/* ── PAINEL ADMIN ── */
#painel-admin{display:none;padding:24px 28px;}
#painel-admin.at{display:block;}
.adm-header{background:linear-gradient(135deg,var(--adm),var(--adm2));border-radius:14px;padding:24px 28px;margin-bottom:22px;color:#fff;}
.adm-header h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.adm-header p{font-size:13px;opacity:.8;}
.adm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px;}
.adm-prof-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);transition:box-shadow .2s;cursor:pointer;}
.adm-prof-card:hover{box-shadow:0 4px 18px rgba(74,20,140,.15);}
.adm-prof-head{background:var(--admc);padding:14px 18px;display:flex;align-items:center;gap:12px;}
.adm-prof-avatar{width:38px;height:38px;border-radius:50%;background:var(--adm2);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.adm-prof-name{font-size:13px;font-weight:600;color:var(--adm);flex:1;}
.adm-prof-stats{display:flex;gap:8px;padding:12px 18px;background:#fafafa;border-top:1px solid var(--bd);}
.adm-stat{text-align:center;flex:1;}
.adm-stat-val{font-size:18px;font-weight:700;color:var(--tx);}
.adm-stat-lbl{font-size:10px;color:var(--mt);text-transform:uppercase;}
.adm-stat.c .adm-stat-val{color:#2E7D32;}
.adm-stat.a .adm-stat-val{color:var(--azm);}
.adm-stat.p .adm-stat-val{color:#E65100;}

/* Modal de visualização admin */
#adm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;overflow-y:auto;padding:20px;}
#adm-modal.open{display:flex;align-items:flex-start;justify-content:center;}
.adm-modal-box{background:#fff;border-radius:16px;width:100%;max-width:900px;margin:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.adm-modal-head{background:linear-gradient(135deg,var(--adm),var(--adm2));padding:20px 28px;display:flex;align-items:center;justify-content:space-between;}
.adm-modal-head h3{font-size:16px;font-weight:700;color:#fff;}
.adm-modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.adm-modal-close:hover{background:rgba(255,255,255,.3);}
.adm-modal-body{padding:0;}
.adm-aluno-tabs{display:flex;overflow-x:auto;background:var(--admc);padding:0 20px;gap:3px;scrollbar-width:thin;}
.adm-aluno-tab{font-size:11px;font-weight:500;padding:9px 14px 7px;border:none;border-radius:6px 6px 0 0;cursor:pointer;white-space:nowrap;background:rgba(74,20,140,.1);color:var(--adm);border-bottom:3px solid transparent;flex-shrink:0;}
.adm-aluno-tab.at{background:#fff;font-weight:700;border-bottom-color:#fff;}
.adm-aluno-tab.pre::after{content:"●";font-size:7px;color:#4CAF50;margin-left:4px;vertical-align:super;}
.adm-ficha-view{display:none;padding:20px 24px;max-height:70vh;overflow-y:auto;}
.adm-ficha-view.at{display:block;}
.adm-readonly-banner{background:#FFF3E0;border-left:4px solid #FF9800;padding:10px 16px;border-radius:0 8px 8px 0;font-size:12px;color:#E65100;margin-bottom:16px;}

/* Itens somente leitura */
.adm-item{border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.adm-item-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--admc);cursor:pointer;}
.adm-item-num{width:26px;height:26px;border-radius:50%;background:var(--adm2);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.adm-item-tit{font-size:13px;font-weight:500;color:var(--adm);flex:1;}
.adm-item-tog{font-size:14px;color:var(--adm2);transition:transform .2s;flex-shrink:0;}
.adm-item-tog.ab{transform:rotate(180deg);}
.adm-item-body{display:none;padding:16px 20px;background:#fafafa;flex-direction:column;gap:12px;}
.adm-item-body.ab{display:flex;}
.adm-campo{display:flex;flex-direction:column;gap:4px;}
.adm-campo label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mt);}
.adm-campo .adm-val{font-size:13px;padding:9px 12px;background:#fff;border:1px solid var(--bd);border-radius:8px;color:var(--tx);min-height:38px;line-height:1.5;white-space:pre-wrap;}
.adm-campo .adm-val.vazio{color:#bbb;font-style:italic;}
.adm-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.st-badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;}
.st-badge.pend{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;}
.st-badge.andam{background:#E3F2FD;color:var(--azd);border:1px solid var(--azb);}
.st-badge.concl{background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7;}

/* ── ABAS PROFESSOR ── */
.abas-bar{background:var(--azd);padding:0 16px;display:flex;align-items:flex-end;gap:3px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--azb) transparent;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.abas-bar::-webkit-scrollbar{height:4px;}
.abas-bar::-webkit-scrollbar-thumb{background:var(--azb);border-radius:2px;}
.aba{font-size:11px;font-weight:500;padding:9px 14px 7px;border:none;border-radius:6px 6px 0 0;cursor:pointer;white-space:nowrap;transition:all .15s;background:rgba(255,255,255,.12);color:rgba(255,255,255,.72);border-bottom:3px solid transparent;max-width:150px;min-width:80px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.aba:hover{background:rgba(255,255,255,.22);color:#fff;}
.aba.at{background:#fff;color:var(--azd);font-weight:700;border-bottom-color:#fff;}
.aba.pre::after{content:"●";font-size:7px;color:#4CAF50;margin-left:4px;vertical-align:super;}

/* ── FICHA ── */
.ficha{display:none;padding:24px 28px;}
.ficha.at{display:block;}
.fh-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 5px rgba(0,0,0,.1);}
.fh-img{width:100%;display:block;}
.fh-meta{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
.mf{display:flex;flex-direction:column;gap:5px;}
.mf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--azm);}
.mf input,.mf select{font-size:14px;padding:10px 13px;border:1.5px solid var(--bd);border-radius:8px;background:var(--gz);color:var(--tx);width:100%;transition:border-color .15s;}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--azm);background:#fff;box-shadow:0 0 0 3px rgba(25,118,210,.1);}
.mf input[readonly]{background:var(--azc);color:var(--azd);font-weight:500;cursor:default;}
.prog-bar{background:#fff;border-radius:10px;padding:12px 22px;margin-bottom:18px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.prog-lbl{font-size:12px;color:var(--mt);white-space:nowrap;}
.prog-track{flex:1;height:10px;background:#e8e8e8;border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;background:var(--azm);border-radius:5px;transition:width .4s ease;}
.prog-pct{font-size:13px;font-weight:700;color:var(--azd);min-width:40px;text-align:right;}
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.ind{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.ind.concl{border-left:4px solid #4CAF50;}
.ind.andam{border-left:4px solid var(--azm);}
.ind.pend{border-left:4px solid #FF9800;}
.ind.total{border-left:4px solid #9C27B0;}
.ind-lbl{font-size:10px;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;}
.ind-val{font-size:28px;font-weight:700;color:var(--tx);line-height:1.2;margin:4px 0;}
.ind-sub{font-size:11px;color:var(--mt);}
.secao{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sec-head{background:var(--azd);padding:13px 22px;display:flex;align-items:center;gap:10px;}
.sec-head h2{font-size:14px;font-weight:600;color:#fff;}
.sec-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;margin-left:auto;}
.sec-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
.dica{font-size:12px;color:var(--azm);background:var(--azc);border-left:4px solid var(--azm);padding:10px 14px;border-radius:0 8px 8px 0;line-height:1.6;}
.item{border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;transition:box-shadow .15s;}
.item:hover{box-shadow:0 2px 10px rgba(21,101,192,.12);}
.item-head{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--azc);cursor:pointer;user-select:none;}
.item-num{width:28px;height:28px;border-radius:50%;background:var(--azm);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.item-tit{font-size:13px;font-weight:500;color:var(--azd);flex:1;line-height:1.3;}
.status-sel{display:flex;gap:4px;flex-shrink:0;}
.st-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;background:rgba(255,255,255,.7);color:#999;}
.st-btn:hover{opacity:.85;}
.st-btn.at-pend{background:#FFF3E0;color:#E65100;border-color:#FFCC80;}
.st-btn.at-andam{background:#E3F2FD;color:var(--azd);border-color:var(--azb);}
.st-btn.at-concl{background:#E8F5E9;color:#1B5E20;border-color:#A5D6A7;}
.item-dot{width:10px;height:10px;border-radius:50%;background:#e0e0e0;flex-shrink:0;transition:background .2s;}
.item-dot.ok{background:#4CAF50;}
.item-tog{font-size:16px;color:var(--azm);transition:transform .2s;flex-shrink:0;}
.item-tog.ab{transform:rotate(180deg);}
.item-body{padding:20px 24px;display:none;flex-direction:column;gap:16px;background:#fff;}
.item-body.ab{display:flex;}
.cg{display:flex;flex-direction:column;gap:6px;width:100%;}
.cg label{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
input.ci{font-size:14px;padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;background:var(--gz);color:var(--tx);width:100%;transition:border-color .15s;}
input.ci:focus{outline:none;border-color:var(--azm);background:#fff;box-shadow:0 0 0 3px rgba(25,118,210,.1);}
textarea.ct{font-size:14px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:8px;background:var(--gz);color:var(--tx);width:100%;min-height:96px;line-height:1.7;resize:vertical;font-family:inherit;transition:border-color .15s;}
textarea.ct:focus{outline:none;border-color:var(--azm);background:#fff;box-shadow:0 0 0 3px rgba(25,118,210,.1);}
.ls{display:flex;flex-direction:column;gap:10px;}
.ls-row{display:flex;align-items:flex-start;gap:10px;}
.ls-n{font-size:14px;font-weight:700;color:var(--azm);width:22px;flex-shrink:0;padding-top:11px;}
.ld{display:flex;flex-direction:column;gap:12px;}
.ld-card{background:var(--gz);border:1.5px solid var(--bd);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.ld-top{display:flex;align-items:center;gap:10px;}
.ld-n{font-size:14px;font-weight:700;color:var(--azm);width:22px;flex-shrink:0;}
.ld-data-lbl{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;white-space:nowrap;}
input[type="date"].ci-dt{font-size:13px;padding:8px 10px;border:1.5px solid var(--bd);border-radius:8px;background:#fff;color:var(--mt);cursor:pointer;width:160px;flex-shrink:0;}
input[type="date"].ci-dt:focus{outline:none;border-color:var(--azm);}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;padding:18px 22px;border-top:1px solid var(--bd);}
.btn{font-size:13px;font-weight:500;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--azm);color:#fff;}
.btn-p:hover{background:var(--azd);}
.btn-s{background:var(--gz);color:var(--tx);border:1px solid var(--bd);}
.btn-s:hover{background:#e8e8e8;}
.btn-d{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;}
.btn-d:hover{background:#FFCDD2;}
.btn-save{background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7;}
.btn-save:hover{background:#C8E6C9;}
#toast{position:fixed;bottom:24px;right:24px;background:#2E7D32;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:all .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.erro{background:#C62828;}

@media(max-width:1000px){.fh-meta{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .ficha{padding:16px 14px}.fh-meta{grid-template-columns:1fr}
  .ind-grid{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}
  .status-sel{flex-wrap:wrap}.login-card{padding:32px 24px}
  .adm-grid{grid-template-columns:1fr}.adm-g2{grid-template-columns:1fr}
}
@media print{
  .top-bar,.adm-tabs,.abas-bar,.btn-row,#loading-overlay,#adm-modal{display:none!important}
  .ficha{display:block!important;padding:0}.item-body{display:flex!important}
  body{background:#fff}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-txt">Conectando...</div>
</div>

<!-- LOGIN -->
<div id="tela-login" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-badge">Sistema de Tutoria</span>
      <h1>FE 1 — Ficha de Evolução<br>da Tutoria Individual</h1>
      <p>Acesse com suas credenciais</p>
    </div>
    <div class="login-field">
      <label>Usuário</label>
      <select id="login-nome">
        <option value="">— Selecione seu nome —</option>
        <optgroup label="── Administração ──">
          <option>Gisele (CGPG)</option>
          <option>Guilherme (Vice-diretor)</option>
          <option>Raffael (Diretor)</option>
          <option>Ricardo (Vice-diretor)</option>
          <option>Silvana (CGPG)</option>
        </optgroup>
        <optgroup label="── Tutores ──">
          <option>Amanda Imamura Russo</option>
          <option>Ana Paula Dos Santos</option>
          <option>Andreia Brandao Braga</option>
          <option>Angelo Jose Costa</option>
          <option>Carlos Pereira De Souza</option>

// ══ ESTADO ══
const est = {};
function resetEst(){
  for(let i=1;i<=NF;i++) est[i]={nome:"",turma:"",tutor:TUTOR_LOGADO||"",atualiz:"",d:{}};
}

// ══ FIREBASE ══
function fbPath(){ return "tutores/"+TUTOR_KEY+"/fichas"; }

function svCloud(){
  if(!TUTOR_KEY) return;
  setCloudStatus("saving");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const dados=JSON.parse(JSON.stringify(est));
    function doSave(){
      window._fbSet(fbPath(),dados)
        .then(()=>{ setCloudStatus("ok"); mostrarToast("✓ Salvo na nuvem","ok"); })
        .catch(()=>{ setCloudStatus("error"); mostrarToast("⚠ Erro ao salvar","erro"); });
    }
    if(window._fbReady){ doSave(); }
    else { window._fbQueue=window._fbQueue||[]; window._fbQueue.push(doSave); }
  },800);
}

function setCloudStatus(s){
  const dot=document.getElementById("cloud-dot"),txt=document.getElementById("cloud-txt");
  if(!dot) return;
  dot.className="cloud-dot"+(s==="saving"?" saving":s==="error"?" error":"");
  txt.textContent=s==="saving"?"Salvando...":s==="error"?"Erro":"Sincronizado";
}

function fbGetSafe(path){
  return new Promise((resolve,reject)=>{
    if(window._fbReady){
      window._fbGet(path).then(resolve).catch(reject);
    } else {
      window._fbQueue = window._fbQueue||[];
      window._fbQueue.push(()=>{
        window._fbGet(path).then(resolve).catch(reject);
      });
    }
  });
}
function carregarDoFirebase(path, cb){
  fbGetSafe(path).then(snap=>cb(snap.val())).catch(()=>cb(null));
}

// ══ TOAST ══
let toastT=null;
function mostrarToast(msg,tipo){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className=tipo==="erro"?"show erro":"show";
  if(toastT) clearTimeout(toastT);
  toastT=setTimeout(()=>t.className="",2500);
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function agora(){
  const d=new Date();
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function registrarAtualizacao(fid){
  const ts=agora(); est[fid].atualiz=ts;
  const el=document.querySelector("[data-fid=\'"+fid+"\'][data-mf=\'atualiz\']");
  if(el) el.value=ts;
}

// ══ SETTERS ══
function setD(fid,key,val){
  est[fid].d[key]=val; registrarAtualizacao(fid); svCloud();
  const iid=key.split("_")[1];
  const dot=document.getElementById("dot_"+fid+"_"+iid);
  const temD=Object.keys(est[fid].d).some(k=>k.startsWith(fid+"_"+iid+"_")&&est[fid].d[k]&&String(est[fid].d[k]).trim());
  if(dot) dot.classList.toggle("ok",temD);
  atuProg(fid); atuInd(fid);
}
function setMeta(fid,campo,val){
  est[fid][campo]=val;
  if(campo!=="atualiz") registrarAtualizacao(fid);
  svCloud();
  if(campo==="nome"){ const fn=val.trim().split(" ")[0]; const b=document.querySelector("[data-aid=\'"+fid+"\']"); if(b) b.textContent=fn||("Aluno "+fid); }
  atuAba(fid); atuProg(fid); atuInd(fid);
}
function setSt(fid,iid,val){
  est[fid].d["_st_"+fid+"_"+iid]=val; registrarAtualizacao(fid); svCloud();
  const sel=document.getElementById("st_"+fid+"_"+iid);
  if(sel){ sel.querySelectorAll(".st-btn").forEach(b=>b.classList.remove("at-pend","at-andam","at-concl")); const a=sel.querySelector("[data-v=\'"+val+"\']"); if(a) a.classList.add("at-"+val); }
  atuInd(fid); atuProg(fid);
}
function atuInd(fid){
  let c=0,a=0,p=0;
  ITENS.forEach(it=>{ const v=est[fid].d["_st_"+fid+"_"+it.id]||"pend"; if(v==="concl")c++; else if(v==="andam")a++; else p++; });
  const g=id=>document.getElementById(id);
  if(g("ic_c_"+fid)) g("ic_c_"+fid).textContent=c;
  if(g("ic_a_"+fid)) g("ic_a_"+fid).textContent=a;
  if(g("ic_p_"+fid)) g("ic_p_"+fid).textContent=p;
}
function atuProg(fid){
  const c=ITENS.filter(it=>(est[fid].d["_st_"+fid+"_"+it.id]||"pend")==="concl").length;
  const pct=Math.round(c/ITENS.length*100);
  const pf=document.getElementById("pf_"+fid),pp=document.getElementById("pp_"+fid);
  if(pf) pf.style.width=pct+"%"; if(pp) pp.textContent=pct+"%";
}
function atuAba(fid){
  const b=document.querySelector("[data-aid=\'"+fid+"\']"); if(!b) return;
  const n=est[fid].nome.trim(),fn=n?n.split(" ")[0]:"";
  b.textContent=fn||("Aluno "+fid);
  const temD=Object.keys(est[fid].d).some(k=>!k.startsWith("_st_")&&est[fid].d[k]&&String(est[fid].d[k]).trim());
  b.classList.toggle("pre",!!(temD||n));
}
function togItem(fid,iid){ const body=document.getElementById("ib_"+fid+"_"+iid),tog=document.getElementById("it_"+fid+"_"+iid),ab=body.classList.contains("ab"); body.classList.toggle("ab",!ab); body.style.display=ab?"none":"flex"; tog.classList.toggle("ab",!ab); }
function expAll(fid){ ITENS.forEach(it=>{ const b=document.getElementById("ib_"+fid+"_"+it.id),t=document.getElementById("it_"+fid+"_"+it.id); if(b){b.classList.add("ab");b.style.display="flex"} if(t) t.classList.add("ab"); }); }
function colAll(fid){ ITENS.forEach(it=>{ const b=document.getElementById("ib_"+fid+"_"+it.id),t=document.getElementById("it_"+fid+"_"+it.id); if(b){b.classList.remove("ab");b.style.display="none"} if(t) t.classList.remove("ab"); }); }

// ══ BUILD CAMPOS ══
function bCampos(campos,fid,iid){
  return campos.map(c=>{
    const k=fid+"_"+iid+"_"+(c.ch||"x");
    if(c.T==="l"){ const v=est[fid].d[k]||""; return "<div class=\"cg\"><label>"+c.lb+"</label><input class=\"ci\" type=\"text\" value=\""+esc(v)+"\" data-fid=\""+fid+"\" data-key=\""+k+"\" placeholder=\"Digite aqui...\"></div>"; }
    if(c.T==="tx"){ const v=est[fid].d[k]||""; return "<div class=\"cg\"><label>"+c.lb+"</label><textarea class=\"ct\" rows=\""+(c.g?6:4)+"\" data-fid=\""+fid+"\" data-key=\""+k+"\" placeholder=\"Digite aqui...\">"+esc(v)+"</textarea></div>"; }
    if(c.T==="g2"){ return "<div class=\"g2\">"+bCampos(c.ii,fid,iid)+"</div>"; }
    if(c.T==="ld"){
      let h="<div class=\"cg\"><label>"+c.lb+"</label><div class=\"ld\">";
      for(let n=1;n<=c.q;n++){ const kv=k+"_v"+n,kd=k+"_d"+n,vv=est[fid].d[kv]||"",vd=est[fid].d[kd]||""; h+="<div class=\"ld-card\"><div class=\"ld-top\"><span class=\"ld-n\">"+n+".</span><span class=\"ld-data-lbl\">Data:</span><input type=\"date\" class=\"ci-dt\" value=\""+esc(vd)+"\" data-fid=\""+fid+"\" data-key=\""+kd+"\"></div><textarea class=\"ct\" rows=\"3\" data-fid=\""+fid+"\" data-key=\""+kv+"\" placeholder=\""+(c.ph||"Descreva...")+"\">"+esc(vv)+"</textarea></div>"; }
      return h+"</div></div>";
    }
    if(c.T==="ls"){
      let h="<div class=\"ls\">";
      for(let n=1;n<=c.q;n++){ const kv=k+"_"+n,vv=est[fid].d[kv]||""; h+="<div class=\"ls-row\"><span class=\"ls-n\">"+n+".</span><textarea class=\"ct\" rows=\"3\" data-fid=\""+fid+"\" data-key=\""+kv+"\" placeholder=\"Registre aqui...\" style=\"min-height:80px\">"+esc(vv)+"</textarea></div>"; }
      return h+"</div>";
    }
    return "";
  }).join("");
}
function bStatus(fid,iid){
  const v=est[fid].d["_st_"+fid+"_"+iid]||"pend";
  const opts=[{v:"pend",lbl:"Pendente",cls:"at-pend"},{v:"andam",lbl:"Em andamento",cls:"at-andam"},{v:"concl",lbl:"Concluído",cls:"at-concl"}];
  let h="<div class=\"status-sel\" id=\"st_"+fid+"_"+iid+"\">"; opts.forEach(o=>{ h+="<button class=\"st-btn"+(v===o.v?" "+o.cls:"")+"\" data-v=\""+o.v+"\" onclick=\"setSt("+fid+","+iid+",\'"+o.v+"\')\">"+o.lbl+"</button>"; }); return h+"</div>";
}
function bItem(item,fid){
  const temD=Object.keys(est[fid].d).some(k=>k.startsWith(fid+"_"+item.id+"_")&&est[fid].d[k]&&String(est[fid].d[k]).trim());

function limpar(fid){
  if(!confirm("Limpar todos os dados desta ficha?")) return;
  est[fid]={nome:"",turma:"",tutor:TUTOR_LOGADO||"",atualiz:"",d:{}};
  svCloud();
  const old=document.getElementById("f_"+fid); if(old) old.remove();

function buildPainelAdmin(){
  const grid=document.getElementById("adm-grid"); grid.innerHTML="";
  const tutores=TUTORES_LIST;
  let loaded=0;
  tutores.forEach(nome=>{
    const key=tutorToKey(nome);
    fbGetSafe("tutores/"+key+"/fichas").then(snap=>{
      const data=snap.val()||{};
      let concl=0,andam=0,pend=0,comAluno=0;
      for(let i=1;i<=NF;i++){
        const f=data[i]||{d:{}};
        if(f.nome&&f.nome.trim()) comAluno++;
        ITENS.forEach(it=>{
          const v=(f.d&&f.d["_st_"+i+"_"+it.id])||"pend";
          if(v==="concl") concl++; else if(v==="andam") andam++; else pend++;
        });
      }
      const initials=nome.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
      const card=document.createElement("div"); card.className="adm-prof-card";
      card.innerHTML="<div class=\"adm-prof-head\"><div class=\"adm-prof-avatar\">"+initials+"</div><div class=\"adm-prof-name\">"+esc(nome)+"</div>"
        +"<span style=\"font-size:11px;color:var(--mt)\">"+comAluno+" aluno"+(comAluno!==1?"s":"")+"</span></div>"
        +"<div class=\"adm-prof-stats\">"
        +"<div class=\"adm-stat c\"><div class=\"adm-stat-val\">"+concl+"</div><div class=\"adm-stat-lbl\">Concluídos</div></div>"
        +"<div class=\"adm-stat a\"><div class=\"adm-stat-val\">"+andam+"</div><div class=\"adm-stat-lbl\">Andamento</div></div>"
        +"<div class=\"adm-stat p\"><div class=\"adm-stat-val\">"+pend+"</div><div class=\"adm-stat-lbl\">Pendentes</div></div>"
        +"</div>";
      card.onclick=()=>abrirModalTutor(nome,data);
      grid.appendChild(card);
      loaded++;
      if(loaded===tutores.length){
        const total=grid.querySelectorAll(".adm-prof-card").length;
        document.getElementById("adm-subtitulo").textContent="Visualização somente leitura — "+total+" tutores cadastrados";
      }
    }).catch(()=>{ loaded++; });

}

// ══ MODAL: VER FICHAS DE UM TUTOR ══
function abrirModalTutor(nome, data){
  document.getElementById("adm-modal-titulo").textContent="Fichas de: "+nome;
  const tabsEl=document.getElementById("adm-aluno-tabs");
  const viewEl=document.getElementById("adm-fichas-view");
  tabsEl.innerHTML=""; viewEl.innerHTML="";

  for(let i=1;i<=NF;i++){
    const f=data[i]||{nome:"",turma:"",tutor:"",atualiz:"",d:{}};
    const nomeFicha=f.nome&&f.nome.trim() ? f.nome.trim() : null;
    const fn=nomeFicha ? nomeFicha.split(" ")[0] : ("Aluno "+i);
    const temD=nomeFicha || Object.keys(f.d||{}).some(k=>!k.startsWith("_st_")&&f.d[k]&&String(f.d[k]).trim());

    // Tab
    const tab=document.createElement("button"); tab.className="adm-aluno-tab"+(i===1?" at":"")+(temD?" pre":"");
    tab.textContent=fn; tab.onclick=(i=>()=>mudarAlunoModal(i))(i); tab.id="adm-atab-"+i;
    tabsEl.appendChild(tab);

    // View
    const view=document.createElement("div"); view.className="adm-ficha-view"+(i===1?" at":""); view.id="adm-aview-"+i;
    view.innerHTML=buildFichaReadonly(f,i,nome);
    viewEl.appendChild(view);
  }
  document.getElementById("adm-modal").classList.add("open");
}

function mudarAlunoModal(idx){
  document.querySelectorAll(".adm-aluno-tab").forEach((t,i)=>t.classList.toggle("at",i+1===idx));
  document.querySelectorAll(".adm-ficha-view").forEach((v,i)=>v.classList.toggle("at",i+1===idx));
}

  let html="<div class=\"adm-readonly-banner\">🔒 Visualização somente leitura — dados de "+esc(tutorNome)+"</div>";
  // Meta
  html+="<div class=\"adm-g2\" style=\"margin-bottom:16px\">"
    +vbox("Nome do Estudante",esc(f.nome||""))
    +vbox("Ano / Série / Turma",esc(f.turma||""))
    +"</div>"
    +"<div class=\"adm-g2\" style=\"margin-bottom:20px\">"
    +vbox("Tutor Responsável",esc(f.tutor||tutorNome))
    +vbox("Últimas Atualizações",esc(f.atualiz||""))
    +"</div>";

  ITENS.forEach(item=>{
    const stKey="_st_"+fid+"_"+item.id; const stVal=d[stKey]||"pend";

function buildCamposReadonly(campos,fid,iid,d){
  function val(k){ return (d[k]||"").trim(); }
  function vbox(label,v,cls){ return "<div class=\"adm-campo\"><label>"+label+"</label><div class=\"adm-val"+(cls?" "+cls:"")+"\">"+(v||"<em style=\'color:#bbb\'>Não preenchido</em>")+"</div></div>"; }
  return campos.map(c=>{
    const k=fid+"_"+iid+"_"+(c.ch||"x");
    if(c.T==="l") return vbox(c.lb, esc(val(k)));
    if(c.T==="tx") return vbox(c.lb, esc(val(k)));
    if(c.T==="g2") return "<div class=\"adm-g2\">"+buildCamposReadonly(c.ii,fid,iid,d)+"</div>";
    if(c.T==="ld"){
      let h="<div class=\"adm-campo\"><label>"+c.lb+"</label><div style=\"display:flex;flex-direction:column;gap:8px\">";
      for(let n=1;n<=c.q;n++){
        const vv=val(k+"_v"+n),vd=val(k+"_d"+n);
        h+="<div style=\"background:var(--gz);border:1px solid var(--bd);border-radius:8px;padding:10px 14px\">"
          +"<div style=\"font-size:11px;color:var(--mt);margin-bottom:4px\">"+n+(vd?". — Data: "+vd:".")+"</div>"
          +"<div style=\"font-size:13px;color:"+(vv?"var(--tx)":"#bbb")+"\">"+( vv?esc(vv):"<em>Não preenchido</em>")+"</div>"
          +"</div>";
      }
      return h+"</div></div>";
    }
    if(c.T==="ls"){
      let h="<div style=\"display:flex;flex-direction:column;gap:8px\">";
      for(let n=1;n<=c.q;n++){ const vv=val(k+"_"+n); h+="<div style=\"display:flex;gap:8px;align-items:flex-start\"><span style=\"font-size:13px;font-weight:700;color:var(--azm);min-width:20px\">"+n+".</span><div style=\"font-size:13px;color:"+(vv?"var(--tx)":"#bbb")+";flex:1\">"+( vv?esc(vv):"<em>Não preenchido</em>")+"</div></div>"; }
      return h+"</div>";
    }
    return "";
  }).join("");
}

// ══ LOGIN / LOGOUT ══
function tentarLogin(){
  const nome=document.getElementById("login-nome").value;
  const senha=document.getElementById("login-senha").value;
  const erro=document.getElementById("login-erro");
  if(!nome){ erro.textContent="Selecione seu nome."; erro.style.display="block"; return; }
  if(CREDS[nome]&&CREDS[nome]===senha){
    erro.style.display="none";
    const btn=document.getElementById("login-btn"); btn.disabled=true; btn.textContent="Carregando...";
    TUTOR_LOGADO=nome; TUTOR_KEY=tutorToKey(nome); IS_ADMIN=ADMINS.includes(nome);
    resetEst();
    document.getElementById("loading-overlay").style.display="flex";
    carregarDoFirebase(fbPath(), data=>{
      if(data) Object.keys(data).forEach(k=>{ if(est[k]) Object.assign(est[k],data[k]); });
      for(let i=1;i<=NF;i++) est[i].tutor=TUTOR_LOGADO;
      document.getElementById("loading-overlay").style.display="none";
      document.getElementById("tela-login").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("top-nome").textContent=TUTOR_LOGADO;
      if(IS_ADMIN){
        document.getElementById("top-bar").className="top-bar adm-bar";
        document.getElementById("adm-badge-top").innerHTML="<span class=\"adm-badge-top\">Administrador</span>";
        document.getElementById("adm-tabs").style.display="flex";
        document.getElementById("adm-titulo").textContent="Painel de "+TUTOR_LOGADO;
        document.getElementById("painel-admin").style.display="block";
        document.getElementById("painel-admin").classList.add("at");
        document.getElementById("abas").style.display="none";
        document.getElementById("fichas").style.display="none";
        buildPainelAdmin();
        buildFichasProf(); // prepara fichas próprias em background
      } else {
        document.getElementById("adm-tabs").style.display="none";
        document.getElementById("painel-admin").style.display="none";
        document.getElementById("abas").style.display="flex";
        buildFichasProf();
      }
    });
  } else {
    erro.textContent="Nome ou senha incorretos."; erro.style.display="block";
    document.getElementById("login-senha").value=""; document.getElementById("login-senha").focus();
  }
}

function buildFichasProf(){
  const bar=document.getElementById("abas"); bar.innerHTML="";
  for(let i=1;i<=NF;i++){
    const b=document.createElement("button"); b.className="aba"; b.setAttribute("data-aid",i);
    const fn=(est[i].nome.trim()||"").split(" ")[0]; b.textContent=fn||("Aluno "+i);
    b.onclick=(i=>()=>irF(i))(i); bar.appendChild(b);
  }
  const cont=document.getElementById("fichas"); cont.innerHTML="";
  for(let i=1;i<=NF;i++){
    const div=document.createElement("div"); div.innerHTML=bFicha(i);
    while(div.firstChild) cont.appendChild(div.firstChild);
    atuAba(i); atuInd(i); atuProg(i);
  }
  if(!IS_ADMIN) irF(1);
}

function logout(){
  TUTOR_LOGADO=null; TUTOR_KEY=null; IS_ADMIN=false;
  document.getElementById("app").style.display="none";
  document.getElementById("tela-login").style.display="flex";
  document.getElementById("top-bar").className="top-bar";
  document.getElementById("adm-badge-top").innerHTML="";
  document.getElementById("login-nome").value=""; document.getElementById("login-senha").value="";
  document.getElementById("login-btn").disabled=false; document.getElementById("login-btn").textContent="Entrar";
  document.getElementById("adm-grid").innerHTML=""; document.getElementById("abas").innerHTML=""; document.getElementById("fichas").innerHTML="";
  document.getElementById("adm-modal").classList.remove("open");
}

window.addEventListener("fbready",()=>{
  document.getElementById("loading-overlay").style.display="none";
  document.getElementById("tela-login").style.display="flex";
});
setTimeout(()=>{ if(!window._fbReady){ document.getElementById("loading-overlay").style.display="none"; document.getElementById("tela-login").style.display="flex"; } },5000);
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("login-senha").addEventListener("keydown",e=>{ if(e.key==="Enter") tentarLogin(); });
});
</script>
